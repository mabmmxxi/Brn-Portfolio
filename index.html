<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>My Interactive Flipbook</title>
    <link href="https://cdn.jsdelivr.net/npm/dearflip-jquery-flipbook@1.7.20/css/dflip.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/dearflip-jquery-flipbook@1.7.20/css/themify-icons.min.css" rel="stylesheet">
    
    <style>
        body { margin: 0; background: #222; }
        #container { height: 100vh; width: 100vw; }
        /* This helps see if the container is actually there */
        ._df_book { background: #333; }
    </style>
</head>
<body>

    <div id="container" class="_df_book" source="./present.pdf"></div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dearflip-jquery-flipbook@1.7.20/js/dflip.min.js"></script>

    <script>
        // Force re-initialization in case GitHub Pages lazy-loads
        $(document).ready(function() {
            console.log("Flipbook script is active.");
        });
    </script>
</body>
</html>
