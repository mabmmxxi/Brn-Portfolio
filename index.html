<!DOCTYPE html>
<html>
<head>
    <title>My Flipbook</title>
    <link href="https://cdn.jsdelivr.net/npm/dearflip-jquery-flipbook@1.7.20/css/dflip.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/dearflip-jquery-flipbook@1.7.20/css/themify-icons.min.css" rel="stylesheet">
</head>
<body style="margin:0;">

    <div id="my-flipbook" class="_df_book" source="./present.pdf"></div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dearflip-jquery-flipbook@1.7.20/js/dflip.min.js"></script>
    
    <script>
        // This will alert you if the PDF name is likely the issue
        $(document).ready(function(){
            console.log("Flipbook engine started. Looking for: " + $("#my-flipbook").attr("source"));
        });
    </script>
</body>
</html>
