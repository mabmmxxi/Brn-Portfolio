<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Flipbook Portfolio</title>

    <link href="https://cdn.jsdelivr.net/gh/alrin0000/dearflip-jquery-flipbook@master/dflip/css/dflip.min.css" rel="stylesheet" type="text/css">
    <link href="https://cdn.jsdelivr.net/gh/alrin0000/dearflip-jquery-flipbook@master/dflip/css/themify-icons.min.css" rel="stylesheet" type="text/css">

    <style>
        body { margin: 0; padding: 0; background-color: #333; }
        /* This centers the book on your screen */
        #my-book-container {
            width: 90%;
            height: 90vh;
            margin: 5vh auto;
        }
    </style>
</head>
<body>

    <div id="my-book-container">
        <div class="_df_book" 
             source="./presentation.pdf" 
             webgl="true" 
             id="portfolio_flipbook">
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/alrin0000/dearflip-jquery-flipbook@master/dflip/js/dflip.min.js"></script>

</body>
</html>
